name: Build IPA for TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: |
          cd mobile
          echo "shamefully-hoist=true" >> .npmrc
          echo "node-linker=hoisted" >> .npmrc
          pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: pnpm install -g @expo/cli

      - name: Prebuild iOS
        run: cd mobile && npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Patch Expo Swift modules for Xcode 16
        run: |
          MOD_ROOT="mobile/node_modules"

          SYS_UI="$MOD_ROOT/expo-system-ui/ios/ExpoSystemUI/ExpoSystemUIModule.swift"
          if [ -f "$SYS_UI" ]; then
            cat > "$SYS_UI" << 'SWIFT'
import ExpoModulesCore

public class ExpoSystemUIModule: Module {
  public func definition() -> ModuleDefinition {
    Name("ExpoSystemUI")

    AsyncFunction("setBackgroundColorAsync") { (_: String?) async in }
    AsyncFunction("getBackgroundColorAsync") { () async -> String? in return nil }
    AsyncFunction("setStatusBarHidden") { (_: Bool, _: String?) async in }
    AsyncFunction("setStatusBarStyle") { (_: String) async in }
    AsyncFunction("setStatusBarBackgroundColorAsync") { (_: String?) async in }
    AsyncFunction("setNavigationBarHidden") { (_: Bool) async in }
    AsyncFunction("setNavigationBarBackgroundColorAsync") { (_: String?) async in }
  }
}
SWIFT
            echo "Patched ExpoSystemUIModule.swift"
          fi

          LINKING_DIR="$MOD_ROOT/expo-linking/ios"
          LINKING_MOD="$LINKING_DIR/ExpoLinkingModule.swift"
          if [ -f "$LINKING_MOD" ]; then
            cat > "$LINKING_MOD" << 'SWIFT'
import ExpoModulesCore

public class ExpoLinkingModule: Module {
  public func definition() -> ModuleDefinition {
    Name("ExpoLinking")

    AsyncFunction("openURL") { (url: String) async throws in
      guard let u = URL(string: url) else { return }
      await MainActor.run { UIApplication.shared.open(u) }
    }

    AsyncFunction("canOpenURL") { (url: String) async -> Bool in
      guard let u = URL(string: url) else { return false }
      return await MainActor.run { UIApplication.shared.canOpenURL(u) }
    }

    Function("getInitialURL") { () -> String? in return nil }
    Function("getLinkingURL") { () -> String? in return nil }

    Events("onURLReceived")
  }
}
SWIFT
            echo "Patched ExpoLinkingModule.swift"
          fi

          LINKING_REG="$LINKING_DIR/ExpoLinkingRegistry.swift"
          if [ -f "$LINKING_REG" ]; then
            cat > "$LINKING_REG" << 'SWIFT'
import Foundation

@objc public class ExpoLinkingRegistry: NSObject {
  @objc public static let shared = ExpoLinkingRegistry()
  private override init() { super.init() }
  @objc public func onNewURL(_ url: URL) {}
}
SWIFT
            echo "Patched ExpoLinkingRegistry.swift"
          fi

          LINKING_SUB="$LINKING_DIR/LinkingAppDelegateSubscriber.swift"
          if [ -f "$LINKING_SUB" ]; then
            cat > "$LINKING_SUB" << 'SWIFT'
import ExpoModulesCore

public class LinkingAppDelegateSubscriber: ExpoAppDelegateSubscriber {
  public func application(_ app: UIApplication, open url: URL, options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
    ExpoLinkingRegistry.shared.onNewURL(url)
    return false
  }
}
SWIFT
            echo "Patched LinkingAppDelegateSubscriber.swift"
          fi

      - name: Disable all code signing
        run: |
          PBXPROJ="mobile/ios/SMSRadar.xcodeproj/project.pbxproj"
          sed -i '' \
            -e 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/CODE_SIGN_IDENTITY = iPhone Developer;/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' \
            -e 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' \
            "$PBXPROJ"
          grep "CODE_SIGNING_REQUIRED\|CODE_SIGN_IDENTITY" "$PBXPROJ" | head -20

      - name: Install CocoaPods
        run: cd mobile/ios && pod install --repo-update

      - name: Bundle JS manually
        run: |
          cd mobile
          mkdir -p ios/main.jsbundle
          node_modules/.bin/react-native bundle \
            --platform ios \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios \
            2>&1 | tail -20
        continue-on-error: true

      - name: Build iOS unsigned
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          BUILD_DIR="$RUNNER_TEMP/build"
          mkdir -p "$BUILD_DIR"
          echo "=== Building: $WORKSPACE ==="
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "SMSRadar" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            NODE_BINARY="$(which node)" \
            SKIP_BUNDLING=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            2>&1 | tee /tmp/xcodebuild.log
          BUILD_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== xcodebuild exit code: $BUILD_EXIT ==="
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo ""
            echo "====== SWIFT/CLANG ERRORS ======"
            grep -E "\.(swift|m|mm|cpp|h):[0-9]+:[0-9]+: error:" /tmp/xcodebuild.log | head -80 || true
            echo ""
            echo "====== FIRST 50 error: LINES ======"
            grep -n "error:" /tmp/xcodebuild.log | grep -v "note:" | grep -v "^#" | head -50 || true
            echo ""
            echo "====== BUILD FAILED SECTION ======"
            grep -A5 "BUILD FAILED" /tmp/xcodebuild.log | head -40 || true
          fi
          exit $BUILD_EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 3

      - name: Package IPA
        run: |
          BUILD_DIR="$RUNNER_TEMP/build"
          APP=$(find "$BUILD_DIR" -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -1)
          [ -z "$APP" ] && APP=$(find "$RUNNER_TEMP" -type d -name "*.app" 2>/dev/null | grep -v "\.app/" | head -1)
          echo "Found app: $APP"
          [ -z "$APP" ] && { echo "ERROR: No .app bundle found"; find "$RUNNER_TEMP" -name "*.app" | head -10; exit 1; }
          brew install ldid 2>/dev/null || true
          find "$APP" -type f \( -name "*.dylib" -o -perm +0111 \) | while read bin; do
            ldid -S "$bin" 2>/dev/null || true
          done
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/SMSRadar.ipa" Payload
          ls -lh "$RUNNER_TEMP/SMSRadar.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SMSRadar-IPA
          path: ${{ runner.temp }}/SMSRadar.ipa
          retention-days: 7
