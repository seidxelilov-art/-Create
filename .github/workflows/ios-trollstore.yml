name: Build IPA for TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: cd mobile && pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: pnpm install -g @expo/cli

      - name: Prebuild iOS
        run: cd mobile && npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: cd mobile/ios && pod install --repo-update

      - name: List workspace and schemes
        run: |
          echo "=== iOS folder contents ==="
          ls mobile/ios/
          echo "=== Schemes ==="
          WORKSPACE=$(ls mobile/ios/*.xcworkspace 2>/dev/null | head -1)
          echo "Workspace: $WORKSPACE"
          xcodebuild -workspace "$WORKSPACE" -list 2>&1 || true

      - name: Build iOS unsigned
        run: |
          WORKSPACE=$(ls mobile/ios/*.xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null \
            | awk '/Schemes:/{found=1;next} found && /^[[:space:]]+[^[:space:]]/{gsub(/^[[:space:]]+/,"",$0); print; exit}')
          echo "Workspace=$WORKSPACE  Scheme=$SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/SMSRadar.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | grep -E "error:|warning:|BUILD|FAILED|Compiling|Linking|note:" | tail -80
          echo "--- Exit code: $?"

      - name: Check archive
        run: |
          echo "Archive path: $RUNNER_TEMP/SMSRadar.xcarchive"
          ls "$RUNNER_TEMP/" || true
          ls "$RUNNER_TEMP/SMSRadar.xcarchive/" || (echo "Archive NOT created!"; exit 1)
          ls "$RUNNER_TEMP/SMSRadar.xcarchive/Products/Applications/" || true

      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/SMSRadar.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "App bundle: $APP"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          brew install ldid 2>/dev/null || true
          BINARY="$RUNNER_TEMP/ipa/Payload/$(basename "$APP")/$(basename "${APP%.app}")"
          ldid -S "$BINARY" 2>/dev/null || echo "ldid sign skipped"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/SMSRadar.ipa" Payload
          echo "IPA size: $(ls -lh "$RUNNER_TEMP/SMSRadar.ipa")"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SMSRadar-IPA
          path: ${{ runner.temp }}/SMSRadar.ipa
          retention-days: 7
