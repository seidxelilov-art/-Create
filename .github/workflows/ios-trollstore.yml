name: Build IPA for TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: cd mobile && pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: pnpm install -g @expo/cli

      - name: Prebuild iOS
        run: cd mobile && npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Disable code signing in project
        run: |
          PBXPROJ="mobile/ios/SMSRadar.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          echo "Patch done"

      - name: Install CocoaPods
        run: cd mobile/ios && pod install --repo-update

      - name: Build iOS unsigned
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          BUILD_DIR="$RUNNER_TEMP/build"
          mkdir -p "$BUILD_DIR"
          echo "Workspace: $WORKSPACE | Scheme: SMSRadar"
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "SMSRadar" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          grep "error:" /tmp/xcodebuild.log | grep -v "^#" | head -40
          tail -40 /tmp/xcodebuild.log
          exit $BUILD_EXIT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 3

      - name: Package IPA
        run: |
          BUILD_DIR="$RUNNER_TEMP/build"
          APP=$(find "$BUILD_DIR" -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find "$RUNNER_TEMP" -type d -name "*.app" 2>/dev/null \
              | grep -v "iphonesimulator" | grep -v "\.app/" | head -1)
          fi
          echo "App: $APP"
          if [ -z "$APP" ]; then exit 1; fi
          brew install ldid 2>/dev/null || true
          find "$APP" -type f -perm +0111 | while read bin; do
            ldid -S "$bin" 2>/dev/null || true
          done
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/SMSRadar.ipa" Payload
          echo "IPA: $(ls -lh "$RUNNER_TEMP/SMSRadar.ipa")"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SMSRadar-IPA
          path: ${{ runner.temp }}/SMSRadar.ipa
          retention-days: 7
