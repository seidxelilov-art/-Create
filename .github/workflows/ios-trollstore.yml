      - name: Build iOS unsigned
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          BUILD_DIR="$RUNNER_TEMP/build"
          mkdir -p "$BUILD_DIR"
          echo "=== Building: $WORKSPACE ==="
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "SMSRadar" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            NODE_BINARY="$(which node)" \
            SKIP_BUNDLING=YES \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          echo "=== xcodebuild exit: $BUILD_EXIT ==="
          grep -E "error:|FAILED" /tmp/xcodebuild.log | grep -v "^#" | head -40 || true
          exit $BUILD_EXIT

      - name: Show build errors (if any)
        if: failure()
        run: |
          echo "====== LAST 100 LINES OF BUILD LOG ======"
          tail -100 /tmp/xcodebuild.log
          echo "====== ALL ERRORS ======"
          grep "error:" /tmp/xcodebuild.log | grep -v "^#" | head -60 || true
