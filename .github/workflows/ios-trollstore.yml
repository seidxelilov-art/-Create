name: Build IPA for TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: cd mobile && pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: pnpm install -g @expo/cli

      - name: Prebuild iOS
        run: cd mobile && npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: cd mobile/ios && pod install --repo-update

      - name: Detect workspace and scheme
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "Found workspace: $WORKSPACE"
          echo "iOS folder contents:"
          ls -la mobile/ios/
          echo "=== Available schemes ==="
          xcodebuild -workspace "$WORKSPACE" -list 2>&1

      - name: Build iOS unsigned
        run: |
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null \
            | awk '/Schemes:/{found=1;next} found{gsub(/^[ \t]+/,"",$0); if(length($0)>0){print; exit}}')
          echo "Building: workspace=$WORKSPACE  scheme=$SCHEME"
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/SMSRadar.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          tail -80 /tmp/xcodebuild.log
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== ERRORS ==="
            grep "error:" /tmp/xcodebuild.log | head -30
            exit $BUILD_EXIT
          fi

      - name: Package IPA
        run: |
          APP=$(find "$RUNNER_TEMP/SMSRadar.xcarchive/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          echo "App bundle: $APP"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          brew install ldid 2>/dev/null || true
          BINARY_NAME=$(basename "${APP%.app}")
          ldid -S "$RUNNER_TEMP/ipa/Payload/$(basename "$APP")/$BINARY_NAME" 2>/dev/null || echo "ldid skipped"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/SMSRadar.ipa" Payload
          echo "IPA size: $(ls -lh "$RUNNER_TEMP/SMSRadar.ipa")"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SMSRadar-IPA
          path: ${{ runner.temp }}/SMSRadar.ipa
          retention-days: 7
