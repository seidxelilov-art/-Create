name: Build IPA for TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: cd mobile && pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: pnpm install -g @expo/cli

      - name: Prebuild iOS
        run: cd mobile && npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: cd mobile/ios && pod install --repo-update

      - name: Detect workspace and scheme
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "Found workspace: $WORKSPACE"
          echo "=== All schemes ==="
          xcodebuild -workspace "$WORKSPACE" -list 2>&1
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null \
            | awk '/Schemes:/{found=1;next} found && /^[[:space:]]+[^[:space:]]/{
                gsub(/^[[:space:]]+/,"",$0); gsub(/[[:space:]]+$/,"",$0); print}' \
            | grep -v "Tests" | head -1)
          if [ -z "$SCHEME" ]; then
            SCHEME="SMSRadar"
          fi
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Using scheme: $SCHEME"

      - name: Setup keychain for signing
        run: |
          security create-keychain -p "github" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "github" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

      - name: Build iOS unsigned
        run: |
          BUILD_DIR="$RUNNER_TEMP/build"
          mkdir -p "$BUILD_DIR"
          echo "Building scheme=$SCHEME workspace=$WORKSPACE"
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          echo "=== Build log (last 80 lines) ==="
          tail -80 /tmp/xcodebuild.log
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== ERRORS ==="
            grep "error:" /tmp/xcodebuild.log | grep -v "^#" | head -30
            exit $BUILD_EXIT
          fi
          echo "=== Build dir contents ==="
          ls -la "$BUILD_DIR/" | head -30

      - name: Package IPA
        run: |
          BUILD_DIR="$RUNNER_TEMP/build"
          APP=$(find "$BUILD_DIR" -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find "$RUNNER_TEMP" -type d -name "*.app" 2>/dev/null \
              | grep -v "iphonesimulator" | grep -v "\.app/" | head -1)
          fi
          echo "App bundle: $APP"
          if [ -z "$APP" ]; then
            echo "FATAL: No .app found. Full list:"
            find "$RUNNER_TEMP" -name "*.app" 2>/dev/null | head -20
            exit 1
          fi
          brew install ldid 2>/dev/null || true
          find "$APP" -type f -perm +0111 | while read bin; do
            ldid -S "$bin" 2>/dev/null || true
          done
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/SMSRadar.ipa" Payload
          echo "SUCCESS — IPA size: $(ls -lh "$RUNNER_TEMP/SMSRadar.ipa")"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SMSRadar-IPA
          path: ${{ runner.temp }}/SMSRadar.ipa
          retention-days: 7
