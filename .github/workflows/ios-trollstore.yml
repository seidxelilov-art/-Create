name: Build IPA for TrollStore

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: cd mobile && pnpm install --no-frozen-lockfile

      - name: Install Expo CLI
        run: pnpm install -g @expo/cli

      - name: Prebuild iOS
        run: cd mobile && npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: cd mobile/ios && pod install --repo-update

      - name: Detect workspace and scheme
        run: |
          WORKSPACE=$(find mobile/ios -maxdepth 1 -name "*.xcworkspace" -type d | head -1)
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null \
            | awk '/Schemes:/{found=1;next} found{gsub(/^[ \t]+/,"",$0); if(length($0)>0){print; exit}}')
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Workspace: $WORKSPACE  |  Scheme: $SCHEME"

      - name: Build iOS (ad-hoc signed)
        run: |
          echo "Building: workspace=$WORKSPACE  scheme=$SCHEME"
          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            > /tmp/xcodebuild.log 2>&1
          BUILD_EXIT=$?
          tail -60 /tmp/xcodebuild.log
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== BUILD ERRORS ==="
            grep "error:" /tmp/xcodebuild.log | head -30
            exit $BUILD_EXIT
          fi

      - name: Find and package IPA
        run: |
          echo "=== DerivedData/Build/Products contents ==="
          ls -la "$RUNNER_TEMP/DerivedData/Build/Products/" 2>/dev/null || echo "No Products dir"
          ls -la "$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/" 2>/dev/null || echo "No Release-iphoneos dir"

          echo "=== All .app bundles in DerivedData ==="
          find "$RUNNER_TEMP/DerivedData" -type d -name "*.app" 2>/dev/null

          APP=$(find "$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos" \
            -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -1)

          if [ -z "$APP" ]; then
            APP=$(find "$RUNNER_TEMP/DerivedData" -type d -name "*.app" 2>/dev/null | \
              grep -v ".app/" | grep -v "iphonesimulator" | head -1)
          fi

          echo "Using app: $APP"
          if [ -z "$APP" ]; then
            echo "FATAL: Could not find .app bundle anywhere"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP" "$RUNNER_TEMP/ipa/Payload/"

          brew install ldid 2>/dev/null || true
          BINARY_NAME=$(basename "${APP%.app}")
          ldid -S "$RUNNER_TEMP/ipa/Payload/$(basename "$APP")/$BINARY_NAME" 2>/dev/null \
            || echo "ldid re-sign skipped"

          cd "$RUNNER_TEMP/ipa" && zip -r "$RUNNER_TEMP/SMSRadar.ipa" Payload
          echo "SUCCESS — IPA size: $(ls -lh "$RUNNER_TEMP/SMSRadar.ipa")"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SMSRadar-IPA
          path: ${{ runner.temp }}/SMSRadar.ipa
          retention-days: 7
